{{template "header" .}}
<div class="fade-in">
    <h1 class="text-2xl font-bold text-white mb-6">⚙️ Admin Dashboard</h1>
    
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8">
        <div class="glass-card rounded-xl p-4 text-center">
            <div class="text-3xl font-bold text-emerald-400">{{.UserCount}}</div>
            <div class="text-slate-400 text-sm">Benutzer</div>
        </div>
        <div class="glass-card rounded-xl p-4 text-center">
            <div class="text-3xl font-bold text-emerald-400">{{.MatchCount}}</div>
            <div class="text-slate-400 text-sm">Spiele</div>
        </div>
        <div class="glass-card rounded-xl p-4 text-center">
            <div class="text-3xl font-bold text-emerald-400">{{.TipCount}}</div>
            <div class="text-slate-400 text-sm">Tipps</div>
        </div>
        <div class="glass-card rounded-xl p-4 text-center">
            <div class="text-3xl font-bold text-emerald-400">{{.FinishedCount}}</div>
            <div class="text-slate-400 text-sm">Beendet</div>
        </div>
    </div>

    <div class="flex flex-col sm:flex-row gap-4">
        <a href="/admin/matches" class="glass-card rounded-lg p-4 flex-1 hover:bg-slate-700/40 transition">
            <div class="font-semibold text-white">📅 Spiele verwalten</div>
            <div class="text-slate-400 text-sm">Spiele bearbeiten</div>
        </a>
        <a href="/admin/results" class="glass-card rounded-lg p-4 flex-1 hover:bg-slate-700/40 transition">
            <div class="font-semibold text-white">🏆 Ergebnisse eintragen</div>
            <div class="text-slate-400 text-sm">Spielergebnisse pflegen</div>
        </a>
        <a href="/admin/users" class="glass-card rounded-lg p-4 flex-1 hover:bg-slate-700/40 transition">
            <div class="font-semibold text-white">👥 Benutzer</div>
            <div class="text-slate-400 text-sm">Benutzer verwalten</div>
        </a>
    </div>
</div>
{{template "footer" .}}
