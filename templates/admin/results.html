{{template "header" .}}
<div class="fade-in">
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold page-title">🏆 Ergebnisse eintragen</h1>
        <a href="/admin" class="text-emerald-600 hover:underline text-sm">← Zurück</a>
    </div>

    {{if .Matches}}
    <div class="space-y-3">
        {{range .Matches}}
        <form method="POST" action="/admin/results/save" class="surface-card rounded-lg p-4">
            <input type="hidden" name="match_id" value="{{.ID}}">
            <div class="flex flex-col sm:flex-row items-center gap-3">
                <div class="flex-1 text-right sm:text-right font-medium text-gray-800">{{.HomeTeam}}</div>
                <div class="flex items-center gap-2">
                    <input type="number" name="home_goals" min="0" max="20" required class="w-16 text-center border rounded-lg px-2 py-1 text-lg font-bold focus:ring-2 focus:ring-emerald-500">
                    <span class="text-gray-400 font-bold">:</span>
                    <input type="number" name="away_goals" min="0" max="20" required class="w-16 text-center border rounded-lg px-2 py-1 text-lg font-bold focus:ring-2 focus:ring-emerald-500">
                </div>
                <div class="flex-1 text-left sm:text-left font-medium text-gray-800">{{.AwayTeam}}</div>
            </div>
            <div class="text-xs text-gray-400 mt-2">{{.Phase}} {{if .GroupName}}· {{.GroupName}}{{end}} · {{.MatchDate}}</div>
            <div class="mt-2 text-right">
                <button type="submit" class="bg-emerald-600 text-white px-4 py-1 rounded text-sm hover:bg-emerald-700 transition">Ergebnis speichern</button>
            </div>
        </form>
        {{end}}
    </div>
    {{else}}
    <div class="text-center text-gray-400 py-12">Alle Spiele haben bereits ein Ergebnis.</div>
    {{end}}
</div>
{{template "footer" .}}
