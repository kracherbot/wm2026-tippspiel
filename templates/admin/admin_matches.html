{{template "header" .}}
<div class="fade-in">
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold text-white">📅 Spiele verwalten</h1>
        <a href="/admin" class="text-emerald-400 hover:text-emerald-300 text-sm">← Zurück</a>
    </div>

    <div class="glass-card rounded-xl overflow-hidden overflow-x-auto">
        <table class="w-full text-sm">
            <thead class="bg-slate-800/80">
                <tr>
                    <th class="px-3 py-2 text-left text-slate-300 font-medium">Phase</th>
                    <th class="px-3 py-2 text-left text-slate-300 font-medium">Heim</th>
                    <th class="px-3 py-2 text-left text-slate-300 font-medium">Gast</th>
                    <th class="px-3 py-2 text-left text-slate-300 font-medium hidden sm:table-cell">Datum</th>
                    <th class="px-3 py-2 text-center text-slate-300 font-medium">Status</th>
                </tr>
            </thead>
            <tbody>
                {{range .Matches}}
                <tr class="border-b border-slate-700/50 hover:bg-slate-700/30">
                    <td class="px-3 py-2 text-slate-400">{{.Phase}} {{if .GroupName}}({{.GroupName}}){{end}}</td>
                    <td class="px-3 py-2 font-medium text-white">{{.HomeTeam}}</td>
                    <td class="px-3 py-2 font-medium text-white">{{.AwayTeam}}</td>
                    <td class="px-3 py-2 text-slate-400 hidden sm:table-cell">{{.MatchDate}}</td>
                    <td class="px-3 py-2 text-center">{{if .Finished}}✅{{else}}⏳{{end}}</td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </div>
</div>
{{template "footer" .}}
