{{template "header" .}}
<div class="fade-in">
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold text-white">👥 Benutzer verwalten</h1>
        <a href="/admin" class="text-emerald-400 hover:text-emerald-300 text-sm">← Zurück</a>
    </div>

    <div class="glass-card rounded-xl overflow-hidden overflow-x-auto">
        <table class="w-full text-sm">
            <thead class="bg-slate-800/80">
                <tr>
                    <th class="px-3 py-2 text-left text-slate-300 font-medium">Name</th>
                    <th class="px-3 py-2 text-left text-slate-300 font-medium hidden sm:table-cell">E-Mail</th>
                    <th class="px-3 py-2 text-center text-slate-300 font-medium">Admin</th>
                    <th class="px-3 py-2 text-center text-slate-300 font-medium">Verifiziert</th>
                    <th class="px-3 py-2 text-center text-slate-300 font-medium">Aktionen</th>
                </tr>
            </thead>
            <tbody>
                {{range .Users}}
                <tr class="border-b border-slate-700/50 hover:bg-slate-700/30">
                    <td class="px-3 py-2 font-medium text-white">{{.DisplayName}}</td>
                    <td class="px-3 py-2 text-slate-400 hidden sm:table-cell">{{.Email}}</td>
                    <td class="px-3 py-2 text-center">{{if .IsAdmin}}⭐{{else}}-{{end}}</td>
                    <td class="px-3 py-2 text-center">{{if .IsVerified}}✅{{else}}❌{{end}}</td>
                    <td class="px-3 py-2 text-center space-x-2">
                        <form method="POST" action="/admin/users/toggle-admin" class="inline">
                            <input type="hidden" name="user_id" value="{{.ID}}">
                            <button type="submit" class="text-xs text-emerald-400 hover:text-emerald-300 hover:underline">{{if .IsAdmin}}Admin entfernen{{else}}Admin machen{{end}}</button>
                        </form>
                        <form method="POST" action="/admin/users/delete" class="inline" onsubmit="return confirm('Benutzer wirklich löschen?')">
                            <input type="hidden" name="user_id" value="{{.ID}}">
                            <button type="submit" class="text-xs text-red-400 hover:text-red-300 hover:underline">Löschen</button>
                        </form>
                    </td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </div>
</div>
{{template "footer" .}}
