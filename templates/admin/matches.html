{{template "header" .}}
<div class="fade-in">
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold page-title">📅 Spiele verwalten</h1>
        <a href="/admin" class="text-emerald-600 hover:underline text-sm">← Zurück</a>
    </div>

    <div class="surface-card rounded-xl overflow-hidden overflow-x-auto">
        <table class="w-full text-sm">
            <thead class="bg-gray-100">
                <tr>
                    <th class="px-3 py-2 text-left">Phase</th>
                    <th class="px-3 py-2 text-left">Heim</th>
                    <th class="px-3 py-2 text-left">Gast</th>
                    <th class="px-3 py-2 text-left hidden sm:table-cell">Datum</th>
                    <th class="px-3 py-2 text-center">Status</th>
                </tr>
            </thead>
            <tbody>
                {{range .Matches}}
                <tr class="border-b hover:bg-gray-50">
                    <td class="px-3 py-2 text-gray-600">{{.Phase}} {{if .GroupName}}({{.GroupName}}){{end}}</td>
                    <td class="px-3 py-2 font-medium">{{.HomeTeam}}</td>
                    <td class="px-3 py-2 font-medium">{{.AwayTeam}}</td>
                    <td class="px-3 py-2 text-gray-500 hidden sm:table-cell">{{.MatchDate}}</td>
                    <td class="px-3 py-2 text-center">{{if .Finished}}✅{{else}}⏳{{end}}</td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </div>
</div>
{{template "footer" .}}
