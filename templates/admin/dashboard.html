{{template "header" .}}
<div class="fade-in">
    <h1 class="text-2xl font-bold page-title mb-6">⚙️ Admin Dashboard</h1>
    
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8">
        <div class="surface-card rounded-xl p-4 text-center">
            <div class="text-3xl font-bold text-emerald-600">{{.UserCount}}</div>
            <div class="text-gray-500 text-sm">Benutzer</div>
        </div>
        <div class="surface-card rounded-xl p-4 text-center">
            <div class="text-3xl font-bold text-emerald-600">{{.MatchCount}}</div>
            <div class="text-gray-500 text-sm">Spiele</div>
        </div>
        <div class="surface-card rounded-xl p-4 text-center">
            <div class="text-3xl font-bold text-emerald-600">{{.TipCount}}</div>
            <div class="text-gray-500 text-sm">Tipps</div>
        </div>
        <div class="surface-card rounded-xl p-4 text-center">
            <div class="text-3xl font-bold text-emerald-600">{{.FinishedCount}}</div>
            <div class="text-gray-500 text-sm">Beendet</div>
        </div>
    </div>

    <div class="flex flex-col sm:flex-row gap-4">
        <a href="/admin/matches" class="surface-card rounded-lg p-4 flex-1 hover:bg-white transition">
            <div class="font-semibold text-gray-700">📅 Spiele verwalten</div>
            <div class="text-gray-500 text-sm">Spiele bearbeiten</div>
        </a>
        <a href="/admin/results" class="surface-card rounded-lg p-4 flex-1 hover:bg-white transition">
            <div class="font-semibold text-gray-700">🏆 Ergebnisse eintragen</div>
            <div class="text-gray-500 text-sm">Spielergebnisse pflegen</div>
        </a>
        <a href="/admin/users" class="surface-card rounded-lg p-4 flex-1 hover:bg-white transition">
            <div class="font-semibold text-gray-700">👥 Benutzer</div>
            <div class="text-gray-500 text-sm">Benutzer verwalten</div>
        </a>
    </div>
</div>
{{template "footer" .}}
