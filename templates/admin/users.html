{{template "header" .}}
<div class="fade-in">
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold page-title">👥 Benutzer verwalten</h1>
        <a href="/admin" class="text-emerald-600 hover:underline text-sm">← Zurück</a>
    </div>

    <div class="surface-card rounded-xl overflow-hidden overflow-x-auto">
        <table class="w-full text-sm">
            <thead class="bg-gray-100">
                <tr>
                    <th class="px-3 py-2 text-left">Name</th>
                    <th class="px-3 py-2 text-left hidden sm:table-cell">E-Mail</th>
                    <th class="px-3 py-2 text-center">Admin</th>
                    <th class="px-3 py-2 text-center">Verifiziert</th>
                    <th class="px-3 py-2 text-center">Aktionen</th>
                </tr>
            </thead>
            <tbody>
                {{range .Users}}
                <tr class="border-b hover:bg-gray-50">
                    <td class="px-3 py-2 font-medium">{{.DisplayName}}</td>
                    <td class="px-3 py-2 text-gray-500 hidden sm:table-cell">{{.Email}}</td>
                    <td class="px-3 py-2 text-center">{{if .IsAdmin}}⭐{{else}}-{{end}}</td>
                    <td class="px-3 py-2 text-center">{{if .IsVerified}}✅{{else}}❌{{end}}</td>
                    <td class="px-3 py-2 text-center space-x-2">
                        <form method="POST" action="/admin/users/toggle-admin" class="inline">
                            <input type="hidden" name="user_id" value="{{.ID}}">
                            <button type="submit" class="text-xs text-blue-600 hover:underline">{{if .IsAdmin}}Admin entfernen{{else}}Admin machen{{end}}</button>
                        </form>
                        <form method="POST" action="/admin/users/delete" class="inline" onsubmit="return confirm('Benutzer wirklich löschen?')">
                            <input type="hidden" name="user_id" value="{{.ID}}">
                            <button type="submit" class="text-xs text-red-600 hover:underline">Löschen</button>
                        </form>
                    </td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </div>
</div>
{{template "footer" .}}
