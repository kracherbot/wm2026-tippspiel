{{template "header" .}}
<div class="auth-shell fade-in py-6 sm:py-12">
    <p class="auth-intro">Willkommen zurück. Melde dich an und tippe direkt los.</p>
    <div class="auth-card">
        <h1 class="text-2xl font-bold text-white mb-6">Anmelden</h1>
        
        {{if .Error}}
        <div class="bg-red-100 text-red-700 p-3 rounded-lg mb-4">{{.Error}}</div>
        {{end}}
        
        <form method="POST" action="/login" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">E-Mail</label>
                <input type="email" name="email" required class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Passwort</label>
                <input type="password" name="password" required class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
            </div>
            <button type="submit" class="w-full bg-emerald-600 text-white py-2 rounded-lg hover:bg-emerald-700 transition font-medium">Anmelden</button>
        </form>
        
        <p class="text-center text-slate-400 text-sm mt-4">Noch kein Konto? <a href="/register" class="text-emerald-400 hover:underline">Registrieren</a></p>
    </div>
</div>
{{template "footer" .}}
