{{template "header" .}}
<div class="text-center py-12 fade-in relative overflow-hidden">
    <!-- Hero Banner -->
    <img src="/static/Hero_Banner.png" alt="WM 2026" class="mx-auto max-h-48 sm:max-h-64 mb-6 rounded-2xl shadow-2xl" />
    
    <h1 class="text-4xl sm:text-5xl font-extrabold mb-4 relative">
        <span class="gold-text gold-glow">WM 2026</span> <span class="text-white">Tippspiel</span>
    </h1>
    <p class="text-slate-400 text-lg mb-10 max-w-lg mx-auto relative">Tippe die Ergebnisse der Fussball-Weltmeisterschaft 2026 und messe dich mit deinen Kollegen!</p>
    
    <div class="flex justify-center gap-8 mb-10 relative">
        <div class="glass-card p-6 text-center min-w-[120px]">
            <div class="text-3xl font-bold gold-text">{{.UserCount}}</div>
            <div class="text-slate-400 text-sm mt-1">Tipper</div>
        </div>
        <div class="glass-card p-6 text-center min-w-[120px]">
            <div class="text-3xl font-bold gold-text">{{.MatchCount}}</div>
            <div class="text-slate-400 text-sm mt-1">Spiele</div>
        </div>
    </div>

    <div class="flex justify-center gap-4 relative">
        <a href="/login" class="bg-emerald-600 hover:bg-emerald-500 text-white px-8 py-3 rounded-xl transition font-semibold shadow-lg shadow-emerald-900/30">Anmelden</a>
        <a href="/register" class="glass-card text-emerald-400 hover:text-emerald-300 px-8 py-3 rounded-xl transition font-semibold">Registrieren</a>
    </div>
</div>
{{template "footer" .}}
