{{template "header" .}}
<div class="max-w-md mx-auto fade-in">
    <h1 class="text-2xl font-bold text-white mb-6">🔒 Passwort ändern</h1>
    
    {{if .Error}}
    <div class="bg-red-900/50 border border-red-500/30 text-red-300 p-3 rounded-xl mb-4">{{.Error}}</div>
    {{end}}
    
    {{if .Success}}
    <div class="bg-emerald-900/50 border border-emerald-500/30 text-emerald-300 p-3 rounded-xl mb-4">{{.Success}}</div>
    {{end}}
    
    <form method="POST" action="/password" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-slate-300 mb-1">Aktuelles Passwort</label>
            <input type="password" name="current_password" required class="w-full rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-300 mb-1">Neues Passwort</label>
            <input type="password" name="new_password" required minlength="6" class="w-full rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-300 mb-1">Neues Passwort bestätigen</label>
            <input type="password" name="new_password_confirm" required minlength="6" class="w-full rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
        </div>
        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-2.5 rounded-xl transition font-semibold shadow-lg shadow-emerald-900/30">Passwort ändern</button>
    </form>
    
    <p class="text-center text-slate-400 text-sm mt-4"><a href="/dashboard" class="text-emerald-400 hover:text-emerald-300">← Zurück zum Dashboard</a></p>
</div>
{{template "footer" .}}
